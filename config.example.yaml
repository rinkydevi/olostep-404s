# Copy to config.yaml and edit. Never commit config.yaml if it ever grows a secret —
# as of v1 it shouldn't, since the API key comes from the OLOSTEP_API_KEY env var only.

site_url: "https://www.olostep.com"

# Glob patterns (same syntax Olostep's Maps API uses for exclude_urls).
# These are auth-gated app routes / playground pages, not marketing/SEO surface.
exclude_patterns:
  - "/dashboard/**"
  - "/auth"
  - "/playground"

# A URL on the site that is guaranteed not to exist. Used every run to verify the
# soft-404 fingerprint (classifier.py) still matches this site's actual 404 page
# before trusting any classification result. See PRODUCTION_PLAN.md §6.1.
canary_url: "https://www.olostep.com/this-page-definitely-does-not-exist-404-test"

# Optional hard cap on Olostep SCRAPE credits per run. Internal page status/harvest is
# still plain HTTP (free, v2.0's core result) — credits go to JS-shell escalation (a
# handful) and, as of v3, resolving every external link plain HTTP left ambiguous
# (blocked, timed out, or even confirmed-dead — see PRODUCTION_PLAN.md §10 for why the
# dead bucket is included). Leave this key out (the default) for NO cap: every
# ambiguous external link is resolved every run, accuracy over cost, per the team's
# own call in PRODUCTION_PLAN.md §10.3 that Olostep usage volume is itself a product
# goal here. Set an integer only if a specific run needs a hard cost ceiling.
# budget_ceiling: 250

# Max concurrent scrape_website calls in flight at once (shared by JS-shell escalation
# and v3 external resolution).
concurrency: 10

# Where run history (JSON, one file per run) is written and read back from for diffing.
runs_dir: "data/runs"

# v3: where resolved external-link verdicts are cached across runs, keyed by URL, so a
# link resolved last run doesn't cost another credit until its staleness window expires.
verdict_cache_path: "data/external_verdicts.json"
verdict_staleness_days: 14
